<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omegle Skit Studio</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Omegle Skit Studio</h1>
  </header>

  <main>
    <!-- SCREEN 1: Upload pre-recorded video -->
    <section id="screen-upload" class="screen active">
      <h2>Upload Pre-Recorded Video</h2>
      <p>Upload the guy's half of the omegle conversation</p>
      <div id="dropzone" class="dropzone">
        <div class="dropzone-content">
          <span class="dropzone-icon">&#128249;</span>
          <p>Drag & drop video here</p>
          <p class="or">or</p>
          <label class="file-btn">
            Browse Files
            <input type="file" id="file-input" accept="video/*" hidden>
          </label>
        </div>
        <div id="upload-progress" class="progress-container" hidden>
          <div class="progress-bar"><div id="upload-bar" class="progress-fill"></div></div>
          <span id="upload-percent">0%</span>
        </div>
      </div>
    </section>

    <!-- SCREEN 2: Record response -->
    <section id="screen-record" class="screen">
      <h2>Record Your Response</h2>
      <div class="video-stack">
        <div class="video-half">
          <video id="prerecorded-video" playsinline></video>
          <span class="video-label">Their Video</span>
        </div>
        <div class="video-half">
          <video id="webcam-preview" playsinline autoplay muted></video>
          <span class="video-label">You</span>
        </div>
      </div>
      <div class="controls">
        <button id="btn-record" class="btn btn-record">Start Recording</button>
        <span id="rec-timer" class="timer" hidden>00:00</span>
      </div>
    </section>

    <!-- SCREEN 3: Preview split-screen -->
    <section id="screen-preview" class="screen">
      <h2>Preview Your Skit</h2>
      <div class="preview-container">
        <div class="video-half">
          <video id="preview-top" playsinline></video>
        </div>
        <div class="video-half">
          <video id="preview-bottom" playsinline></video>
        </div>
      </div>
      <div class="controls">
        <button id="btn-play-preview" class="btn">Play Preview</button>
        <button id="btn-rerecord" class="btn btn-secondary">Re-Record</button>
        <button id="btn-approve" class="btn btn-approve">Approve & Merge</button>
      </div>
    </section>

    <!-- SCREEN 4: Merging / Done -->
    <section id="screen-done" class="screen">
      <div id="merging-state">
        <h2>Merging Your Video...</h2>
        <div class="progress-container">
          <div class="progress-bar"><div id="merge-bar" class="progress-fill"></div></div>
          <span id="merge-percent">0%</span>
        </div>
      </div>
      <div id="done-state" hidden>
        <h2>Skit Complete!</h2>
        <a id="download-link" class="btn btn-approve" download>Download Video</a>
        <button id="btn-new" class="btn btn-secondary">Start New Skit</button>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
